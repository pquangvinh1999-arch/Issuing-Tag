<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHMPRO - BY VINH</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            user-select: none;
        }
        
        /* Hiệu ứng Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        /* Hiệu ứng Input chuyên nghiệp */
        .input-focus {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-focus:focus { 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(225, 29, 72, 0.2);
            border-color: #e11d48;
        }

        /* Gradient Button */
        .btn-rose-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            transition: all 0.2s ease;
        }
        .btn-rose-gradient:active { transform: scale(0.96); }

        /* Animation List mượt mà hơn */
        .list-enter-active, .list-leave-active { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .list-enter-from, .list-leave-to { opacity: 0; transform: scale(0.9) translateY(20px); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col">
    <div class="bg-gradient-to-br from-rose-500 via-rose-600 to-pink-700 rounded-[2rem] p-7 text-white shadow-2xl mb-8 relative overflow-hidden">
        <div class="relative z-10 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight leading-tight">WHMFG PRO<br><span class="text-rose-200 font-semibold text-lg">QUÉT MÃ XUẤT HÀNG</span></h1>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <p class="text-[10px] opacity-80 uppercase font-bold tracking-widest">{{ currentTime }}</p>
                </div>
            </div>
            <div class="text-right">
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 border border-white/30">
                    <p class="text-4xl font-black leading-none">{{ queue.length }}</p>
                    <p class="text-[9px] uppercase font-bold opacity-90 mt-1">Tags chờ xuất</p>
                </div>
            </div>
        </div>
        <div class="absolute -right-12 -bottom-12 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
        <div class="absolute -left-12 -top-12 w-32 h-32 bg-pink-400/20 rounded-full blur-2xl"></div>
    </div>

    <div class="glass-panel rounded-[2.5rem] p-8 space-y-6 mb-8">
        <div>
            <label class="text-xs font-extrabold text-slate-500 uppercase ml-1 tracking-wider">🏷️ Quét Tag ID Cần Xuất</label>
            <div class="relative mt-2">
                <input v-model="form.tag" ref="tagInput" @keyup.enter="handleScan"
                       class="w-full p-5 bg-rose-50 border-2 border-rose-100 rounded-2xl text-center text-2xl font-black text-rose-700 outline-none transition-all input-focus placeholder:text-rose-300 placeholder:text-lg"
                       placeholder="Quét mã vạch tại đây...">
                <div class="absolute -top-1 -right-1 w-3 h-3 bg-rose-600 rounded-full animate-ping"></div>
            </div>
        </div>

        <div class="pt-2">
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="w-full btn-rose-gradient text-white py-5 rounded-2xl font-extrabold text-xl shadow-xl hover:shadow-rose-200 transition-all disabled:opacity-50 flex justify-center items-center gap-3">
                <span v-if="!isSyncing" class="flex items-center gap-2">🚀 XUẤT KHO</span>
                <span v-else class="flex items-center gap-2">
                    <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    ĐANG ĐẨY DỮ LIỆU...
                </span>
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-4 px-2">
            <h3 class="text-xs font-extrabold text-slate-500 uppercase tracking-widest">Lịch sử quét mới nhất</h3>
            <button @click="clearAll" v-if="queue.length > 0" class="bg-white text-rose-600 text-[10px] px-3 py-1 rounded-full font-bold shadow-sm border border-rose-100 hover:bg-rose-50 transition-colors">
                XÓA TẤT CẢ
            </button>
        </div>
        
        <div class="space-y-3 pb-10">
            <transition-group name="list">
                <div v-for="item in queueReversed" :key="item.id" 
                     class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center group hover:border-rose-400 transition-all hover:shadow-md">
                    <div class="flex items-center gap-4">
                        <div>
                            <p class="text-sm font-extrabold text-slate-800 tracking-tight">{{ item.tag }}</p>
                            <p class="text-[9px] text-slate-400 font-medium mt-0.5">{{ item.time }}</p>
                        </div>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="editItem(item.id)" class="text-slate-400 p-2 hover:text-blue-600 hover:bg-slate-50 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.232z" /></svg>
                        </button>
                        <button @click="deleteItem(item.id)" class="text-slate-400 p-2 hover:text-rose-500 hover:bg-slate-50 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            </transition-group>
            <div v-if="queue.length === 0" class="text-center py-16 text-slate-400 text-sm italic bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                Chưa có dữ liệu. Hãy quét Tag ID đầu tiên.
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed, nextTick } = Vue;

    createApp({
        setup() {
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_WHM_Shipping')) || []);
            const form = ref({ tag: '' });
            const isSyncing = ref(false);
            const currentTime = ref('');
            const tagInput = ref(null);

            // Thay bằng Link Web App của anh
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbyMECd-im1zwQJ8TQEgDbJF3O6go4uQLSl9UoIoTxnQjgY9WbufHwt8JWkyhVOPBKgn/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const updateTime = () => {
                currentTime.value = new Date().toLocaleTimeString('vi-VN');
            };

            const handleScan = () => {
                const scannedTag = form.value.tag.trim();
                if (!scannedTag) return;

                const isDuplicate = queue.value.some(item => item.tag === scannedTag);
                if (isDuplicate) {
                    alert(`⚠️ CẢNH BÁO: Tag ID [${scannedTag}] đã được quét trước đó!`);
                    form.value.tag = ''; 
                    nextTick(() => tagInput.value.focus());
                    return;
                }

                queue.value.push({
                    id: Date.now(),
                    tag: scannedTag,
                    time: new Date().toLocaleString('vi-VN')
                });

                form.value.tag = ''; 
                saveLocal();
                nextTick(() => tagInput.value.focus());
            };

            const syncCloud = async () => {
                isSyncing.value = true;
                try {
                    const payload = { 
                        action: "shipping", // Gửi hành động xuất kho
                        data: queue.value.map(i => ({
                            tagID: i.tag,
                            thoiGian: i.time 
                        }))
                    };

                    const response = await fetch(CLOUD_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (result.result && result.result.includes("thành công")) {
                        alert("🚀 " + result.result);
                        queue.value = [];
                        saveLocal();
                        nextTick(() => tagInput.value.focus());
                    } else {
                        alert("⚠️ Server báo lỗi: " + (result.result || "Không xác định"));
                    }
                } catch (e) {
                    alert("❌ Lỗi kết nối Cloud: " + e.message);
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => localStorage.setItem('Vinh_WHM_Shipping', JSON.stringify(queue.value));
            const deleteItem = (id) => { queue.value = queue.value.filter(i => i.id !== id); saveLocal(); };
            const editItem = (id) => {
                const item = queue.value.find(i => i.id === id);
                const newVal = prompt("Sửa lại Tag ID:", item.tag);
                if (newVal) {
                    const checkNewVal = queue.value.some(i => i.tag === newVal.trim() && i.id !== id);
                    if(checkNewVal) { alert("Mã này đã tồn tại!"); return; }
                    item.tag = newVal.trim(); 
                    saveLocal(); 
                }
            };
            const clearAll = () => { if(confirm('Xóa hết hàng chờ xuất?')) { queue.value = []; saveLocal(); }};

            onMounted(() => {
                updateTime();
                setInterval(updateTime, 1000);
                tagInput.value.focus();
            });

            return { queue, form, queueReversed, isSyncing, currentTime, tagInput, handleScan, syncCloud, deleteItem, editItem, clearAll };
        }
    }).mount('#app');
</script>
</body>
</html>
